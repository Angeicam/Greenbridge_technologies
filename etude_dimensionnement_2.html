<style>
  /* remplace seulement ces blocs */

  .logo-text{
    display:flex;
    align-items:flex-start;
    gap:12px;
    min-width:0;
    flex:1 1 auto;
    overflow:hidden;
  }

  .logo-text img{
    height:56px;
    width:auto;
    display:block;
    flex:0 0 auto;
    object-fit:contain;
  }

  .brand-stack{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:flex-start;
    line-height:1;
    text-align:left;
    min-width:0;
    margin:0;
    padding:0;
    overflow:hidden;
  }

  .company-name{
    font-size:38px;
    font-weight:800;
    letter-spacing:1px;
    padding:0;
    margin:0;
    border-radius:8px;
    color:#04462e;
    -webkit-text-stroke:1px var(--gold-base);
    text-shadow:0 3px 6px rgba(0,0,0,0.6);
    position:relative;
    top:2px;
    white-space:nowrap;
    line-height:1;
    text-align:left;
    width:max-content;
    display:block;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .company-tagline{
    font-size:15px;
    font-weight:700;
    letter-spacing:5px;
    text-transform:uppercase;
    color:#dfffe6;
    padding:0;
    margin:2px 0 0 0;
    text-shadow:0 2px 6px rgba(0,0,0,0.45);
    -webkit-text-stroke:0.4px rgba(212,175,55,0.55);
    white-space:nowrap;
    line-height:1;
    text-align:left;
    width:max-content;
    display:block;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .burger{
    display:none;
    width:46px;
    height:46px;
    border-radius:10px;
    border:none;
    background:transparent;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex:0 0 auto;
  }

  .burger .icon{
    display:block;
    position:relative;
    width:28px;
    height:20px;
  }

  .burger .icon span{
    position:absolute;
    left:0;
    right:0;
    height:3px;
    background:#fff;
    border-radius:999px;
    transition:all .25s ease;
    box-shadow:0 1px 2px rgba(0,0,0,.22);
  }

  .burger .icon span:nth-child(1){top:0}
  .burger .icon span:nth-child(2){top:8.5px}
  .burger .icon span:nth-child(3){top:17px}

  .burger.open .icon span:nth-child(1){
    transform:translateY(8.5px) rotate(45deg);
  }
  .burger.open .icon span:nth-child(2){
    opacity:0;
    transform:scaleX(.4);
  }
  .burger.open .icon span:nth-child(3){
    transform:translateY(-8.5px) rotate(-45deg);
  }

  .mobile-nav{
    display:none;
    position:fixed;
    top:calc(var(--topbar-h)+var(--header-h));
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(8px);
    z-index:2000;
    opacity:0;
    transition:opacity .2s ease;
    overflow:auto;
  }

  .mobile-nav.open{
    display:block;
    opacity:1;
  }

  .mobile-nav .panel{
    background:linear-gradient(180deg, rgba(7,50,23,.98), rgba(6,31,20,.98));
    box-shadow:0 18px 50px rgba(0,0,0,.48);
    border-top:1px solid rgba(255,255,255,.06);
    max-height:88vh;
    overflow:auto;
    border-radius:0 0 22px 22px;
  }

  .mobile-nav .inner{
    padding:14px 5vw 20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .mobile-nav .close-row{
    display:flex;
    justify-content:flex-end;
  }

  .mobile-nav .close-btn{
    border:none;
    background:rgba(255,255,255,.08);
    color:#fff;
    font-weight:800;
    border-radius:10px;
    padding:10px 14px;
    cursor:pointer;
    transition:background .18s ease, transform .18s ease;
  }

  .mobile-nav .close-btn:hover{
    background:rgba(255,255,255,.14);
    transform:translateY(-1px);
  }

  .mobile-nav .contact{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:14px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    color:var(--muted-text-color);
  }

  .mobile-nav .contact strong{
    color:#fff;
    font-size:14px;
    letter-spacing:1px;
  }

  .mobile-nav .contact .city-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    color:#dfffe6;
    font-weight:600;
  }

  .mobile-nav .contact .city-list span{
    background:rgba(212,175,55,.08);
    border:1px solid rgba(212,175,55,.12);
    padding:6px 10px;
    border-radius:999px;
  }

  .mobile-nav .contact .phone-line{
    display:flex;
    align-items:center;
    gap:8px;
    color:#fff;
    font-weight:700;
    flex-wrap:wrap;
  }

  .mobile-nav .menu-links{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .mobile-nav a{
    padding:13px 12px;
    color:#fff;
    width:100%;
    text-align:left;
    border-radius:10px;
    font-weight:700;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:background .18s ease, color .18s ease, border-color .18s ease;
  }

  .mobile-nav .mobile-link:hover{
    background:rgba(124,179,66,0.10);
    color:var(--accent-2);
  }

  .mobile-nav .mobile-link.active{
    background:linear-gradient(90deg, rgba(212,175,55,.10), rgba(212,175,55,.04));
    color:var(--accent-2);
    border:1px solid rgba(212,175,55,.18);
  }

  .mobile-nav .socials{
    margin-top:2px;
    border-top:1px solid rgba(255,255,255,0.05);
    padding-top:12px;
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }

  .mobile-nav .socials a{
    width:auto;
    padding:0;
    font-size:18px;
  }

  @media (max-width:820px){
    .logo-text{
      gap:8px;
      align-items:flex-start;
    }
    .logo-text img{
      height:46px;
    }
    .company-name{
      font-size:30px;
    }
    .company-tagline{
      font-size:12px;
      letter-spacing:4px;
    }
  }

  @media (max-width:768px){
    .company-name{
      font-size:26px;
    }
    .company-tagline{
      font-size:10px;
      letter-spacing:2px;
    }
  }

  @media (max-width:480px){
    .logo-text{
      gap:6px;
    }
    .logo-text img{
      height:38px;
    }
    .company-name{
      font-size:18px;
      letter-spacing:.4px;
    }
    .company-tagline{
      font-size:9px;
      letter-spacing:1.5px;
    }
  }
</style>
