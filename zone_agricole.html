<script>
/* =========================================================
   À AJOUTER / REMPLACER UNIQUEMENT DANS LA LOGIQUE ÉTUDE
   Ne touche pas aux fonctions UI déjà présentes :
   openMenu, closeMenu, setupBurger, setupBrilliance,
   drawChart, setupDesktopDropdowns, updateActiveNav.
========================================================= */

/* ---------- 1) Données cultures / pompe ---------- */
const CROP_DB = {
  tomate:       { label: "Tomate",            needMm: 5.5 },
  oignon:       { label: "Oignon",            needMm: 4.5 },
  piment:       { label: "Piment",            needMm: 5.0 },
  gombo:        { label: "Gombo",             needMm: 4.0 },
  aubergine:    { label: "Aubergine",         needMm: 4.5 },
  laitue:       { label: "Laitue",            needMm: 3.5 },
  chou:         { label: "Chou",              needMm: 4.0 },
  carotte:      { label: "Carotte",           needMm: 4.0 },
  manioc:       { label: "Manioc",            needMm: 3.5 },
  mais:         { label: "Maïs",              needMm: 5.5 },
  riz:          { label: "Riz",               needMm: 7.0 },
  haricot:      { label: "Haricot",           needMm: 4.0 },
  arachide:     { label: "Arachide",          needMm: 4.0 },
  banane:       { label: "Banane plantain",   needMm: 6.0 },
  patate_douce: { label: "Patate douce",      needMm: 4.5 }
};

const PUMP_PRESETS = {
  auto: { name: "Choix automatique", powerKw: null, eff: null },
  p037: { name: "0,37 kW — petit débit", powerKw: 0.37, eff: 0.42 },
  p055: { name: "0,55 kW — petit/moyen débit", powerKw: 0.55, eff: 0.45 },
  p075: { name: "0,75 kW — moyen débit", powerKw: 0.75, eff: 0.48 },
  p11:  { name: "1,1 kW — standard agricole", powerKw: 1.1, eff: 0.50 },
  p15:  { name: "1,5 kW — standard renforcé", powerKw: 1.5, eff: 0.52 },
  p22:  { name: "2,2 kW — débit élevé", powerKw: 2.2, eff: 0.55 },
  p30:  { name: "3,0 kW — forte demande", powerKw: 3.0, eff: 0.56 }
};

function populateCrops() {
  if (!cropEl) return;
  cropEl.innerHTML = Object.entries(CROP_DB)
    .map(([key, c]) => `<option value="${key}">${c.label}</option>`)
    .join("");
}

function populatePumpPresets() {
  if (!pumpPresetEl) return;
  pumpPresetEl.innerHTML = Object.entries(PUMP_PRESETS)
    .map(([key, p]) => `<option value="${key}">${p.name}</option>`)
    .join("");
}

function getPumpPreset() {
  if (!pumpPresetEl) return PUMP_PRESETS.auto;
  const key = pumpPresetEl.value || "auto";
  return PUMP_PRESETS[key] || PUMP_PRESETS.auto;
}

/* ---------- 2) Besoin en eau automatique selon culture ---------- */
function updateNeedMmForCountryAndCrop() {
  const cropKey = cropEl ? cropEl.value : "tomate";
  const cropCfg = CROP_DB[cropKey] || CROP_DB.tomate;
  if (needMmEl) needMmEl.value = cropCfg.needMm.toFixed(1);
}

/* ---------- 3) Petit helper pour la culture ---------- */
function getCropCfg() {
  const cropKey = cropEl ? cropEl.value : "tomate";
  return CROP_DB[cropKey] || CROP_DB.tomate;
}

/* ---------- 4) Render preset optionnel ---------- */
function ensurePresetUI() {
  // Si ton HTML n’a pas encore le select pumpPreset, ce bloc ne casse rien.
  if (pumpPresetEl && pumpPresetEl.options.length === 0) {
    populatePumpPresets();
  }
  if (cropEl && cropEl.options.length === 0) {
    populateCrops();
  }
}

/* ---------- 5) Compute principal corrigé ---------- */
function computeAll() {
  const loc = contactNumbers[cityEl.value] || contactNumbers.abidjan;

  const sunH = solarHoursForCity(cityEl.value);
  const derate = solarDerateForCity(cityEl.value) * (Number(pvDerateEl.value || 85) / 100);

  const cropCfg = getCropCfg();
  if (needMmEl) needMmEl.value = cropCfg.needMm.toFixed(1);

  const needMm = Number(needMmEl.value || cropCfg.needMm || 0);
  const areaHa = Number(areaHaEl.value || 0);
  const irrigDays = Math.max(1, Number(irrigDaysEl.value || 1));
  const pumpHours = Math.max(0.1, Number(pumpHoursEl.value || 1));

  const source = sourceTypeEl.value || "bassin";
  const staticHead = Math.max(0, Number(staticHeadEl.value || 0));
  const elev = Math.max(0, Number(elevationEl.value || 0));
  const pipeDistance = Math.max(0, Number(pipeDistanceEl.value || 0));
  const electricalDistance = Math.max(0, Number(electricalDistanceEl.value || 0));
  const pumpEff = clamp(Number(pumpEffEl.value || 55) / 100, 0.1, 0.9);
  const panelW = Math.max(10, Number(panelWEl.value || 350));
  const reservoirDays = Math.max(0, Number(reservoirDaysEl.value || 0));

  // eau/jour = surface(ha) × besoin(mm/j) × 10
  const volumeDaily_m3 = Math.max(0, areaHa * needMm * 10);

  const q_m3h = volumeDaily_m3 / pumpHours;
  const pipeD = pipeDiameterForFlow(q_m3h, pipeDistance);

  const friction = (pipeDistance / 100) * Math.pow(q_m3h / 10, 1.6) * Math.pow(63 / pipeD, 4);
  const tdh = staticHead + elev + (SOURCE_HEAD_BONUS[source] || 0) + friction;

  const hydraulicW = 2.725 * q_m3h * tdh;

  const pumpPreset = getPumpPreset();
  let pumpInputW = hydraulicW / pumpEff;
  let pumpInputKw = pumpInputW / 1000;
  let pumpKwRec = standardPumpSize(pumpInputKw * 1.18);
  let pumpNote = "Calcul automatique";

  // Si une pompe est choisie, on affine avec ses caractéristiques.
  if (pumpPreset.powerKw) {
    const presetEff = pumpPreset.eff || pumpEff;
    pumpInputW = hydraulicW / Math.max(0.1, presetEff);
    pumpInputKw = pumpInputW / 1000;
    pumpKwRec = standardPumpSize(Math.max(pumpPreset.powerKw, pumpInputKw * 1.08));
    pumpNote = `Pompe choisie : ${pumpPreset.name}`;
  }

  const dailyKwhPump = pumpInputKw * pumpHours;
  const dailyKwhTotal = activeMode === "pump"
    ? dailyKwhPump
    : getAllLoads().reduce((s, l) => s + ((Number(l.power || 0) * Number(l.hours || 0)) / 1000), 0);

  const pvKw = Math.max(0.1, dailyKwhTotal / Math.max(0.1, sunH * derate));
  const panels = Math.max(1, Math.ceil((pvKw * 1000) / panelW));

  const batteryPack = batteryPackForTech(batteryTechEl.value);
  let batteryKwh = 0;
  let batteryPacks = 0;
  let inverterRec = 0;
  let batteryLife = batteryPack.lifeYearsHot;

  if (activeMode === "pump") {
    const bufferH = Math.max(0, Number(autonomyDaysEl.value || 0));
    batteryKwh = bufferH > 0 ? (pumpInputKw * bufferH) / batteryPack.usableDoD : 0;
    batteryPacks = batteryPack.packKwh > 0 ? Math.max(0, Math.ceil(batteryKwh / batteryPack.packKwh)) : 0;
    inverterRec = standardInverterSize(Math.max(300, pumpKwRec * 1000 * 1.2));
  } else {
    const loadDaily = getAllLoads().reduce((s, l) => s + ((Number(l.power || 0) * Number(l.hours || 0)) / 1000), 0);
    const autonomyDays = Math.max(0, Number(autonomyDaysEl.value || 0));
    batteryKwh = autonomyDays > 0 ? (loadDaily * autonomyDays) / batteryPack.usableDoD : 0;
    batteryPacks = batteryPack.packKwh > 0 ? Math.max(0, Math.ceil(batteryKwh / batteryPack.packKwh)) : 0;
    inverterRec = standardInverterSize(Math.max(300, Math.ceil(Math.max(1, loadDaily * 1000 * 1.35))));
  }

  const reservoirM3 = volumeDaily_m3 * reservoirDays;

  volDayEl.innerText = `${fmt(volumeDaily_m3, 2)} m³`;
  flowQEl.innerText = `${fmt(q_m3h, 2)} m³/h`;
  tdhEl.innerText = `${fmt(tdh, 1)} m`;
  pumpKwEl.innerText = `${fmt(pumpKwRec, 1)} kW`;
  pvKwEl.innerText = `${fmt(pvKw, 2)} kWc`;
  panelsCountEl.innerText = panels;
  pipeRecEl.innerText = pipeLabel(pipeD);

  // câble calculé sans toucher à la forme
  cableRecEl.innerText = `${standardCableSection(Math.max(1, pumpInputW / 550), Math.max(5, electricalDistance), 550, 3)} mm²`;
  batteryRecEl.innerText = `${fmt(batteryKwh, 2)} kWh`;
  invRecEl.innerText = `${inverterRec} W`;
  reservoirRecEl.innerText = `${fmt(reservoirM3, 2)} m³`;

  const cableSection = standardCableSection(Math.max(1, pumpInputW / 550), Math.max(5, electricalDistance), 550, 3);
  wireNoteEl.innerText = `Câble cuivre ${cableSection} mm² pour ${electricalDistance} m`;

  safeNoteEl.innerText = source === "puits"
    ? "Puits : vérifier la profondeur, la remontée d’eau et le débit réel."
    : "Priorité au bassin de réserve et à la gravité pour la fiabilité.";

  consDayKpi.innerText = `${fmt(dailyKwhTotal, 2)} kWh`;
  autonomyKpi.innerText = activeMode === "pump"
    ? `${fmt(Number(autonomyDaysEl.value || 0), 1)} h tampon`
    : `${fmt(Number(autonomyDaysEl.value || 0), 1)} j`;
  lifeKpi.innerText = batteryLife;

  document.getElementById("r_volume").classList.toggle("highlight", volumeDaily_m3 > 0);
  document.getElementById("r_pump").classList.toggle("highlight", pumpKwRec >= 1.5);
  document.getElementById("r_pv").classList.toggle("highlight", pvKw >= 1);
  document.getElementById("r_buffer").classList.toggle("highlight", batteryKwh > 0);
  document.getElementById("r_inv").classList.toggle("highlight", inverterRec > 500);

  const solar = dailySolarCurve(cityEl.value, pvKw);
  const load = activeMode === "pump"
    ? loadCurvePump(dailyKwhTotal, pumpHours, 8)
    : loadCurveEnergy(getAllLoads());
  const battery = batteryCurve(solar, load, Math.max(1, batteryKwh || 1), 0.45);
  const yMax = Math.max(1, ...solar, ...load, batteryKwh || 1);

  drawChart(
    cityEl.value,
    solar,
    load,
    battery,
    yMax,
    activeMode === "pump"
      ? "Pompage + solaire — " + sourceName(source)
      : "Énergie autonome — élevage / transformation"
  );

  // Garder les boules / menu / graphique intactes: on ne touche pas ici.
  lastSnapshot = {
    mode: activeMode,
    city: cityEl.value,
    country: countryEl.value,
    crop: cropEl.value,
    source: source,
    timestamp: new Date().toLocaleString("fr-FR"),
    sunH,
    temp: loc.temp,
    volumeDaily_m3,
    q_m3h,
    tdh,
    pumpKwRec,
    pvKw,
    panels,
    panelW,
    pipeD,
    batteryKwh,
    batteryPacks,
    inverterRec,
    reservoirM3,
    dailyKwhTotal,
    batteryTech: batteryTechEl.value,
    batteryTechName: batteryPack.name,
    batteryLife,
    loads: getAllLoads(),
    solar,
    load,
    battery,
    totalMonthKwh: dailyKwhTotal * 30,
    pumpHours,
    irrigDays,
    pipeDistance,
    electricalDistance,
    pumpNote
  };
}

/* ---------- 6) PDF : garder le même rendu, juste relier aux nouvelles données ---------- */
function renderPdfBlock() {
  const s = lastSnapshot;
  if (!s) return "";

  const tech = batteryPackForTech(s.batteryTech);
  const loadsHtml = s.loads.length
    ? s.loads.map(l => `<tr><td style="padding:8px;border:1px solid #e6e6e6">${l.name}</td><td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${l.power} W</td><td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${l.hours} h/j</td><td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${fmt((l.power*l.hours)/1000,2)} kWh/j</td></tr>`).join("")
    : `<tr><td colspan="4" style="padding:8px;border:1px solid #e6e6e6;text-align:center;color:#666">Aucun consommateur additionnel</td></tr>`;

  const safety = [
    "Protection manque d’eau, marche à sec et surintensité.",
    "Sectionneur DC, fusibles, parafoudre type II et mise à la terre.",
    "Clapet anti-retour et contrôle des pertes de charge sur la conduite.",
    "Batterie : ventilation, câbles protégés et charge adaptée à la technologie.",
    "Bassins et stockage d’eau recommandés avant stockage électrique."
  ];

  return `<div style="position:relative;width:1120px;padding:22px;background:#fff;color:#222;font-family:Poppins,Arial,sans-serif;">
    <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-30deg);z-index:0;pointer-events:none;opacity:0.06;font-size:72px;color:#000;font-weight:900;white-space:nowrap">GREENBRIDGE — À TITRE INDICATIF</div>
    <div style="position:relative;z-index:1;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px">
        <div style="display:flex;gap:12px;align-items:center">
          <div style="background:linear-gradient(180deg,#e9f7ed,#d9f0db);padding:8px 10px;border-radius:8px;border:1px solid #dfeedf">
            <div style="font-weight:800;color:#04462e;font-size:16px">GREENBRIDGE</div>
            <div style="font-size:11px;color:#556b56">Étude agricole</div>
          </div>
          <div>
            <div style="font-size:16px;font-weight:700;color:#062d1b">Résumé de dimensionnement</div>
            <div style="font-size:12px;color:#666;margin-top:4px">${s.timestamp} — ${s.city}</div>
          </div>
        </div>
        <div style="text-align:right;font-size:12px;color:#666">
          <div><strong>Pays :</strong> ${s.country === "sn" ? "Sénégal" : "Côte d’Ivoire"}</div>
          <div><strong>Mode :</strong> ${s.mode === "pump" ? "Pompage agricole" : "Énergie autonome"}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border:1px solid #eee;padding:12px;border-radius:12px;background:#fbfffb">
        <div><div style="font-weight:700">Volume / jour</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${fmt(s.volumeDaily_m3,2)} m³</div></div>
        <div><div style="font-weight:700">Débit / TDH</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${fmt(s.q_m3h,2)} m³/h — ${fmt(s.tdh,1)} m</div></div>
        <div><div style="font-weight:700">Pompe conseillée</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${fmt(s.pumpKwRec,1)} kW</div></div>
        <div><div style="font-weight:700">PV requis</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${fmt(s.pvKw,2)} kWc</div></div>
        <div><div style="font-weight:700">Panneaux</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${s.panels}</div></div>
        <div><div style="font-weight:700">Tuyauterie</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${s.pipeD} mm</div></div>
        <div><div style="font-weight:700">Câble</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${standardCableSection(Math.max(1,(s.pumpKwRec*1000)/550),Math.max(5,s.electricalDistance),550,3)} mm²</div></div>
        <div><div style="font-weight:700">Batterie tampon</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${fmt(s.batteryKwh,2)} kWh</div></div>
        <div><div style="font-weight:700">Onduleur standard</div><div style="font-size:18px;font-weight:800;color:#0b4d26;margin-top:6px">${s.inverterRec} W</div></div>
      </div>

      <div style="margin-top:12px;display:grid;grid-template-columns:1.15fr .85fr;gap:12px">
        <div style="border:1px solid #eee;border-radius:12px;padding:12px;background:#fff">
          <div style="font-weight:800;margin-bottom:8px">Profil journalier 24 h</div>
          <img src="${document.getElementById("dailyChart").toDataURL("image/png")}" style="width:100%;height:auto;border:1px solid #f0f0f0;border-radius:10px" />
          <div style="font-size:12px;color:#666;margin-top:8px">Le soleil est pris en compte de 06h à 18h. La courbe illustre la charge, la production solaire et l’effet de la batterie.</div>
        </div>
        <div style="border:1px solid #eee;border-radius:12px;padding:12px;background:#fbfffb">
          <div style="font-weight:800;margin-bottom:8px">Sécurité et lecture rapide</div>
          <ul style="margin:0;padding-left:18px;color:#333;font-size:12px;line-height:1.5">${safety.map(x=>`<li>${x}</li>`).join("")}</ul>
          <div style="margin-top:10px;font-size:12px;color:#666"><strong>Conseil :</strong> pour une étude plus fine, un relevé terrain et une validation de la pompe sont recommandés.</div>
          <div style="margin-top:10px;font-size:12px;color:#666"><strong>Batterie :</strong> ${tech.name} — durée de vie réaliste en climat chaud : ${tech.lifeYearsHot}.</div>
          <div style="margin-top:10px;font-size:12px;color:#666"><strong>Consommateurs :</strong> ${s.loads.length} équipement(s) ajouté(s).</div>
          <div style="margin-top:10px;font-size:12px;color:#666"><strong>Culture :</strong> ${s.crop} — besoin automatique appliqué.</div>
          <div style="margin-top:10px;font-size:12px;color:#666"><strong>Pompe :</strong> ${s.pumpNote || "Calcul automatique"}</div>
        </div>
      </div>

      <div style="margin-top:12px;font-size:11px;color:#666;display:flex;justify-content:space-between;gap:10px">
        <div>Synthèse générée par GREENBRIDGE — à titre indicatif</div>
        <div>${s.city}</div>
      </div>

      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:12px">
        <thead>
          <tr>
            <th style="border:1px solid #eee;padding:6px;background:#f7f7f7;text-align:left">Équipement</th>
            <th style="border:1px solid #eee;padding:6px;background:#f7f7f7;text-align:center">Puissance</th>
            <th style="border:1px solid #eee;padding:6px;background:#f7f7f7;text-align:center">Heures/j</th>
            <th style="border:1px solid #eee;padding:6px;background:#f7f7f7;text-align:center">kWh/j</th>
          </tr>
        </thead>
        <tbody>${loadsHtml}</tbody>
      </table>
    </div>
  </div>`;
}

/* ---------- 7) Setup events : enlever wellRecovery du calcul seulement ---------- */
function setupStudyEventsMinimal() {
  countryEl.addEventListener("change", () => {
    populateCities(countryEl.value);
    updateNeedMmForCountryAndCrop();
    computeAll();
  });

  cityEl.addEventListener("change", () => {
    updateLocationPills();
    computeAll();
  });

  cropEl.addEventListener("change", () => {
    updateNeedMmForCountryAndCrop();
    computeAll();
  });

  [
    areaHaEl, needMmEl, irrigDaysEl, pumpHoursEl, sourceTypeEl,
    staticHeadEl, elevationEl, pipeDistanceEl, electricalDistanceEl,
    pipeMaterialEl, panelWEl, pumpEffEl, pvDerateEl, reservoirDaysEl
    // wellRecoveryEl volontairement retiré du calcul
  ].forEach(el => {
    if (!el) return;
    el.addEventListener("input", computeAll);
    el.addEventListener("change", computeAll);
  });

  if (pumpPresetEl) pumpPresetEl.addEventListener("change", computeAll);

  if (tabPump) tabPump.addEventListener("click", () => toggleMode("pump"));
  if (tabEnergy) tabEnergy.addEventListener("click", () => toggleMode("energy"));

  addManual.addEventListener("click", () => {
    const name = (consName.value || "").trim();
    const power = Number(consPower.value || 0);
    const hours = Number(consHours.value || 0);
    if (!name || power <= 0 || hours <= 0) {
      alert("Nom, puissance et heures/j sont obligatoires.");
      return;
    }
    consumers.push({ name, power, hours });
    consName.value = "";
    consPower.value = "";
    consHours.value = "";
    renderConsumers();
    computeAll();
  });

  consumerList.addEventListener("click", e => {
    const del = e.target.closest(".del");
    if (del) {
      const i = Number(del.dataset.idx);
      consumers.splice(i, 1);
      renderConsumers();
      computeAll();
    }
  });

  calcBtn.addEventListener("click", computeAll);

  resetBtn.addEventListener("click", () => {
    if (!confirm("Réinitialiser les champs aux valeurs par défaut ?")) return;
    countryEl.value = "ci";
    populateCities("ci");
    cityEl.value = "abidjan";
    cropEl.value = "tomate";
    areaHaEl.value = "0.5";
    needMmEl.value = "5.5";
    irrigDaysEl.value = "3";
    pumpHoursEl.value = "4";
    sourceTypeEl.value = "bassin";
    staticHeadEl.value = "8";
    elevationEl.value = "4";
    pipeDistanceEl.value = "120";
    electricalDistanceEl.value = "20";
    pipeMaterialEl.value = "pehd";
    panelWEl.value = "350";
    pumpEffEl.value = "55";
    pvDerateEl.value = "85";
    reservoirDaysEl.value = "2";
    batteryTechEl.value = "lifepo4";
    autonomyDaysEl.value = "1";
    batteryPackKwhEl.value = "5.12";
    inverterSizeEl.value = "1000";
    if (pumpPresetEl) pumpPresetEl.value = "auto";
    consumers = [];
    renderConsumers();
    toggleMode("pump");
    updateLocationPills();
    updateNeedMmForCountryAndCrop();
    computeAll();
  });

  exportPdfBtn.addEventListener("click", generatePDF);

  sourceTypeEl.addEventListener("change", () => {
    sourcePill.innerHTML = '<i class="fas fa-water"></i> ' + sourceName(sourceTypeEl.value);
    computeAll();
  });

  batteryTechEl.addEventListener("change", () => {
    const tech = batteryPackForTech(batteryTechEl.value);
    batteryPackKwhEl.value = tech.packKwh;
    computeAll();
  });

  window.addEventListener("resize", computeAll);
  window.addEventListener("load", computeAll);
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeMenu();
  });
}

/* ---------- 8) Initialisation ---------- */
function initStudyLogicOnly() {
  ensurePresetUI();
  populateCrops();
  populatePumpPresets();
  updateLocationPills();
  renderSuggestedPresets();
  renderConsumers();
  setupStudyEventsMinimal();
  toggleMode("pump");
  updateNeedMmForCountryAndCrop();
  computeAll();
}

/* appelle seulement une fois */
initStudyLogicOnly();
</script>
