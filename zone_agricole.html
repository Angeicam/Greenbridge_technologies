<script>
(() => {
  'use strict';

  /* =========================
     Helpers
  ========================= */
  const $ = (id) => document.getElementById(id);
  const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
  const fmt = (n, d = 2) => {
    const v = Number.isFinite(Number(n)) ? Number(n) : 0;
    return v.toFixed(d);
  };
  const safeNum = (v, fallback = 0) => {
    const n = Number(v);
    return Number.isFinite(n) ? n : fallback;
  };

  /* =========================
     DOM refs
  ========================= */
  const countryEl = $('country');
  const cityEl = $('city');
  const cropEl = $('crop');
  const areaHaEl = $('areaHa');
  const needMmEl = $('needMm');
  const irrigDaysEl = $('irrigDays');
  const pumpHoursEl = $('pumpHours');
  const sourceTypeEl = $('sourceType');
  const staticHeadEl = $('staticHead');
  const elevationEl = $('elevation');
  const pipeDistanceEl = $('pipeDistance');
  const electricalDistanceEl = $('electricalDistance');
  const pipeMaterialEl = $('pipeMaterial');
  const panelWEl = $('panelW');
  const pumpEffEl = $('pumpEff');
  const pvDerateEl = $('pvDerate');
  const reservoirDaysEl = $('reservoirDays');
  const batteryTechEl = $('batteryTech');
  const autonomyDaysEl = $('autonomyDays');
  const batteryPackKwhEl = $('batteryPackKwh');
  const inverterSizeEl = $('inverterSize');
  const pumpPresetEl = $('pumpPreset');

  const tabPump = $('tabPump');
  const tabEnergy = $('tabEnergy');
  const pumpMode = $('pumpMode');
  const energyMode = $('energyMode');

  const addManual = $('addManual');
  const consName = $('consName');
  const consPower = $('consPower');
  const consHours = $('consHours');
  const consumerList = $('consumerList');
  const calcBtn = $('calcBtn');
  const resetBtn = $('resetBtn');
  const exportPdfBtn = $('exportPdfBtn');

  const volDayEl = $('volDay');
  const flowQEl = $('flowQ');
  const tdhEl = $('tdh');
  const pumpKwEl = $('pumpKw');
  const pvKwEl = $('pvKw');
  const panelsCountEl = $('panelsCount');
  const pipeRecEl = $('pipeRec');
  const cableRecEl = $('cableRec');
  const batteryRecEl = $('batteryRec');
  const invRecEl = $('invRec');
  const reservoirRecEl = $('reservoirRec');
  const wireNoteEl = $('wireNote');
  const safeNoteEl = $('safeNote');
  const consDayKpi = $('consDayKpi');
  const autonomyKpi = $('autonomyKpi');
  const lifeKpi = $('lifeKpi');
  const sourcePill = $('sourcePill');

  const mobileNav = $('mobileNav');
  const mobileBackdrop = $('mobileBackdrop');
  const mobileCloseBtn = $('mobileCloseBtn');
  const burgerBtn = $('burgerBtn');

  const printBlock = $('printBlock');
  const dailyChart = $('dailyChart');

  /* =========================
     Data
  ========================= */
  const SOURCE_HEAD_BONUS = {
    bassin: 0,
    puits: 4,
    forage: 6,
    reservoir: 1,
    reseau: 0
  };

  const CITIES = {
    ci: ['Abidjan', 'Bouaké', 'Yamoussoukro', 'Korhogo', 'San Pedro', 'Daloa'],
    sn: ['Dakar', 'Thiès', 'Saint-Louis', 'Kaolack', 'Touba', 'Ziguinchor']
  };

  const CROP_DB = {
    tomate:       { label: 'Tomate',            needMm: 5.5 },
    oignon:       { label: 'Oignon',            needMm: 4.5 },
    piment:       { label: 'Piment',            needMm: 5.0 },
    gombo:        { label: 'Gombo',             needMm: 4.0 },
    aubergine:    { label: 'Aubergine',         needMm: 4.5 },
    laitue:       { label: 'Laitue',            needMm: 3.5 },
    chou:         { label: 'Chou',              needMm: 4.0 },
    carotte:      { label: 'Carotte',           needMm: 4.0 },
    manioc:       { label: 'Manioc',            needMm: 3.5 },
    mais:         { label: 'Maïs',              needMm: 5.5 },
    riz:          { label: 'Riz',               needMm: 7.0 },
    haricot:      { label: 'Haricot',           needMm: 4.0 },
    arachide:     { label: 'Arachide',          needMm: 4.0 },
    banane:       { label: 'Banane plantain',   needMm: 6.0 },
    patate_douce: { label: 'Patate douce',      needMm: 4.5 }
  };

  const PUMP_PRESETS = {
    auto: { name: 'Choix automatique', powerKw: null, eff: null, qRef: null, headRef: null },
    p037: { name: '0,37 kW — petit débit', powerKw: 0.37, eff: 0.42, qRef: 1.5, headRef: 8 },
    p055: { name: '0,55 kW — petit/moyen débit', powerKw: 0.55, eff: 0.45, qRef: 2.5, headRef: 10 },
    p075: { name: '0,75 kW — moyen débit', powerKw: 0.75, eff: 0.48, qRef: 3.5, headRef: 12 },
    p11:  { name: '1,1 kW — standard agricole', powerKw: 1.1, eff: 0.50, qRef: 5.0, headRef: 15 },
    p15:  { name: '1,5 kW — standard renforcé', powerKw: 1.5, eff: 0.52, qRef: 7.0, headRef: 18 },
    p22:  { name: '2,2 kW — débit élevé', powerKw: 2.2, eff: 0.55, qRef: 10.0, headRef: 22 },
    p30:  { name: '3,0 kW — forte demande', powerKw: 3.0, eff: 0.56, qRef: 13.0, headRef: 28 }
  };

  const BATTERY_TECH = {
    lifepo4: { name: 'LiFePO4', usableDoD: 0.9, packKwh: 5.12, lifeYearsHot: '8–12 ans' },
    gel:     { name: 'Gel',     usableDoD: 0.5, packKwh: 2.4,  lifeYearsHot: '3–5 ans' },
    agm:     { name: 'AGM',     usableDoD: 0.5, packKwh: 2.4,  lifeYearsHot: '3–5 ans' }
  };

  /* =========================
     State
  ========================= */
  let activeMode = 'pump';
  let consumers = [];
  let lastSnapshot = null;

  /* =========================
     Utilities
  ========================= */
  function sourceName(src) {
    return {
      bassin: 'Bassin / réserve',
      puits: 'Puits',
      forage: 'Forage',
      reservoir: 'Réservoir',
      reseau: 'Réseau'
    }[src] || 'Source';
  }

  function batteryPackForTech(key) {
    return BATTERY_TECH[key] || BATTERY_TECH.lifepo4;
  }

  function standardPumpSize(kw) {
    const sizes = [0.37, 0.55, 0.75, 1.1, 1.5, 2.2, 3, 4, 5.5, 7.5, 11, 15, 18.5, 22, 30];
    const n = safeNum(kw, 0);
    for (const s of sizes) if (n <= s) return s;
    return sizes[sizes.length - 1];
  }

  function standardInverterSize(w) {
    const sizes = [300, 500, 800, 1000, 1500, 2000, 2500, 3000, 4000, 5000, 6000];
    const n = safeNum(w, 300);
    for (const s of sizes) if (n <= s) return s;
    return sizes[sizes.length - 1];
  }

  function pipeDiameterForFlow(q_m3h, distance) {
    const q = safeNum(q_m3h, 0);
    const d = safeNum(distance, 0);
    let dia = 32;
    if (q > 1.5) dia = 40;
    if (q > 3) dia = 50;
    if (q > 5) dia = 63;
    if (q > 8) dia = 75;
    if (q > 12) dia = 90;
    if (q > 18) dia = 110;
    if (d > 200 && q > 4) dia = Math.max(dia, 75);
    return dia;
  }

  function pipeLabel(d) {
    return `${d} mm`;
  }

  function standardCableSection(powerRatio, distance) {
    const r = safeNum(powerRatio, 1);
    const dist = safeNum(distance, 0);
    let section = 2.5;
    if (r > 2) section = 4;
    if (r > 4) section = 6;
    if (r > 6) section = 10;
    if (r > 9) section = 16;
    if (dist > 50) section = Math.max(section, 6);
    if (dist > 100) section = Math.max(section, 10);
    return section;
  }

  function getPumpPreset() {
    if (!pumpPresetEl) return PUMP_PRESETS.auto;
    const key = pumpPresetEl.value || 'auto';
    return PUMP_PRESETS[key] || PUMP_PRESETS.auto;
  }

  function populateCrops() {
    if (!cropEl) return;
    cropEl.innerHTML = Object.entries(CROP_DB)
      .map(([key, c]) => `<option value="${key}">${c.label}</option>`)
      .join('');
  }

  function populatePumpPresets() {
    if (!pumpPresetEl) return;
    pumpPresetEl.innerHTML = Object.entries(PUMP_PRESETS)
      .map(([key, p]) => `<option value="${key}">${p.name}</option>`)
      .join('');
  }

  function populateCities(country) {
    if (!cityEl) return;
    const cities = CITIES[country] || CITIES.ci;
    cityEl.innerHTML = cities.map(c => `<option value="${c.toLowerCase()}">${c}</option>`).join('');
    cityEl.value = country === 'ci' ? 'abidjan' : 'dakar';
  }

  function updateLocationPills() {}

  function getAllLoads() {
    return [...consumers];
  }

  function renderConsumers() {
    if (!consumerList) return;
    consumerList.innerHTML = consumers.length
      ? consumers.map((l, idx) => `
        <div class="consumer-item" style="display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 10px;border:1px solid #e8e8e8;border-radius:10px;margin-bottom:8px;">
          <div>
            <div style="font-weight:700">${l.name}</div>
            <div style="font-size:12px;color:#666">${fmt(l.power,0)} W · ${fmt(l.hours,1)} h/j</div>
          </div>
          <button class="del" data-idx="${idx}" style="border:none;background:#f5f5f5;padding:6px 10px;border-radius:8px;cursor:pointer">Supprimer</button>
        </div>
      `).join('')
      : `<div style="padding:10px;color:#777">Aucun consommateur additionnel</div>`;
  }

  function updateNeedMmForCountryAndCrop() {
    const crop = CROP_DB[cropEl?.value] || CROP_DB.tomate;
    if (needMmEl) needMmEl.value = crop.needMm.toFixed(1);
  }

  function dailySolarCurve(city, pvKw) {
    const arr = [];
    const peak = safeNum(pvKw, 0);
    for (let h = 0; h < 24; h++) {
      const x = (h - 6) / 12;
      const sun = (h >= 6 && h <= 18) ? Math.sin(Math.PI * Math.min(1, Math.max(0, x))) : 0;
      arr.push(Math.max(0, peak * sun));
    }
    return arr;
  }

  function loadCurvePump(dailyKwh, pumpHours) {
    const arr = new Array(24).fill(0);
    const h = clamp(Math.round(safeNum(pumpHours, 4)), 1, 24);
    const kw = safeNum(dailyKwh, 0) / Math.max(1, h);
    for (let i = 8; i < 8 + h && i < 24; i++) arr[i] = kw;
    return arr;
  }

  function loadCurveEnergy(loads) {
    const arr = new Array(24).fill(0);
    const items = Array.isArray(loads) ? loads : [];
    items.forEach(l => {
      const powerKw = safeNum(l.power, 0) / 1000;
      const hours = clamp(Math.round(safeNum(l.hours, 0)), 0, 24);
      for (let i = 0; i < hours; i++) {
        const hour = (6 + i) % 24;
        arr[hour] += powerKw;
      }
    });
    return arr;
  }

  function batteryCurve(solar, load, batteryKwh, startSoc = 0.45) {
    const arr = [];
    let soc = safeNum(batteryKwh, 0) * clamp(startSoc, 0, 1);
    for (let h = 0; h < 24; h++) {
      const pv = safeNum(solar[h], 0);
      const ld = safeNum(load[h], 0);
      soc += pv - ld;
      soc = clamp(soc, 0, batteryKwh);
      arr.push(soc);
    }
    return arr;
  }

  function drawChart(city, solar, load, battery, yMax, title) {
    if (!dailyChart) return;
    const ctx = dailyChart.getContext('2d');
    if (!ctx) return;

    const w = dailyChart.width;
    const h = dailyChart.height;
    ctx.clearRect(0, 0, w, h);

    const padL = 42, padR = 16, padT = 28, padB = 30;
    const plotW = w - padL - padR;
    const plotH = h - padT - padB;
    const maxY = Math.max(1, safeNum(yMax, 1));
    const xStep = plotW / 23;

    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#e9e9e9';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padT + (plotH * i / 4);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(w - padR, y);
      ctx.stroke();
    }

    ctx.fillStyle = '#666';
    ctx.font = '12px Arial';
    ctx.fillText('kW / kWh', 6, 18);

    function drawLine(data, stroke) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 24; i++) {
        const x = padL + i * xStep;
        const y = padT + plotH - (safeNum(data[i], 0) / maxY) * plotH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    drawLine(solar, '#f0ad00');
    drawLine(load, '#1570ef');
    drawLine(battery, '#10a37f');

    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px Arial';
    ctx.fillText(title || 'Profil journalier', padL, 18);

    ctx.font = '11px Arial';
    for (let i = 0; i <= 24; i += 3) {
      const x = padL + (plotW * i / 24);
      ctx.fillStyle = '#666';
      ctx.fillText(String(i), x - 4, h - 10);
    }
  }

  /* =========================
     Compute
  ========================= */
  function computeAll() {
    const areaHa = Math.max(0, safeNum(areaHaEl?.value, 0));
    const cropCfg = CROP_DB[cropEl?.value] || CROP_DB.tomate;
    const needMm = cropCfg.needMm;
    if (needMmEl) needMmEl.value = needMm.toFixed(1);

    const irrigDays = Math.max(0, safeNum(irrigDaysEl?.value, 0));
    const pumpHours = Math.max(0.1, safeNum(pumpHoursEl?.value, 4));
    const source = sourceTypeEl?.value || 'bassin';
    const staticHead = Math.max(0, safeNum(staticHeadEl?.value, 0));
    const elevation = Math.max(0, safeNum(elevationEl?.value, 0));
    const pipeDistance = Math.max(0, safeNum(pipeDistanceEl?.value, 0));
    const electricalDistance = Math.max(0, safeNum(electricalDistanceEl?.value, 0));
    const pumpEff = clamp(safeNum(pumpEffEl?.value, 55) / 100, 0.1, 0.9);
    const panelW = Math.max(10, safeNum(panelWEl?.value, 350));
    const reservoirDays = Math.max(0, safeNum(reservoirDaysEl?.value, 0));
    const derate = clamp(safeNum(pvDerateEl?.value, 85) / 100, 0.1, 1);

    const batteryPack = batteryPackForTech(batteryTechEl?.value);
    const autonomyDays = Math.max(0, safeNum(autonomyDaysEl?.value, 0));

    const volumeDaily_m3 = Math.max(0, areaHa * needMm * 10);

    const q_m3h = volumeDaily_m3 / pumpHours;
    const pipeD = pipeDiameterForFlow(q_m3h, pipeDistance);

    const friction = (pipeDistance / 100) * Math.pow(q_m3h / 10, 1.6) * Math.pow(63 / pipeD, 4);
    const tdh = staticHead + elevation + (SOURCE_HEAD_BONUS[source] || 0) + friction;

    const hydraulicW = 2.725 * q_m3h * tdh;
    const pumpInputWBase = hydraulicW / pumpEff;
    const pumpInputKwBase = pumpInputWBase / 1000;

    const pumpPreset = getPumpPreset();

    let pumpInputW = pumpInputWBase;
    let pumpInputKw = pumpInputKwBase;
    let pumpKwRec = standardPumpSize(pumpInputKwBase * 1.18);
    let pumpSelectionNote = 'Calcul automatique';

    if (pumpPreset.powerKw) {
      const presetEff = pumpPreset.eff || pumpEff;
      pumpInputW = hydraulicW / Math.max(0.1, presetEff);
      pumpInputKw = pumpInputW / 1000;
      pumpKwRec = standardPumpSize(Math.max(pumpPreset.powerKw, pumpInputKw * 1.08));
      pumpSelectionNote = `Pompe choisie : ${pumpPreset.name}`;
    } else {
      pumpSelectionNote = 'Pompe proposée automatiquement selon la puissance requise';
    }

    const dailyKwhPump = pumpInputKw * pumpHours;
    const loads = getAllLoads();
    const dailyKwhTotal = activeMode === 'pump'
      ? dailyKwhPump
      : loads.reduce((s, l) => s + ((safeNum(l.power, 0) * safeNum(l.hours, 0)) / 1000), 0);

    const sunH = 5.5;
    const pvKw = Math.max(0.1, dailyKwhTotal / Math.max(0.1, sunH * derate));
    const panels = Math.max(1, Math.ceil((pvKw * 1000) / panelW));

    let batteryKwh = 0;
    let batteryPacks = 0;
    let inverterRec = 0;
    let batteryLife = batteryPack.lifeYearsHot;

    if (activeMode === 'pump') {
      batteryKwh = autonomyDays > 0 ? (pumpInputKw * autonomyDays) / batteryPack.usableDoD : 0;
      batteryPacks = batteryPack.packKwh > 0 ? Math.max(0, Math.ceil(batteryKwh / batteryPack.packKwh)) : 0;
      inverterRec = standardInverterSize(Math.max(300, pumpKwRec * 1000 * 1.2));
    } else {
      const loadDaily = dailyKwhTotal;
      batteryKwh = autonomyDays > 0 ? (loadDaily * autonomyDays) / batteryPack.usableDoD : 0;
      batteryPacks = batteryPack.packKwh > 0 ? Math.max(0, Math.ceil(batteryKwh / batteryPack.packKwh)) : 0;
      inverterRec = standardInverterSize(Math.max(300, Math.ceil(Math.max(1, loadDaily * 1000 * 1.35))));
    }

    const reservoirM3 = volumeDaily_m3 * reservoirDays;

    if (volDayEl) volDayEl.innerText = `${fmt(volumeDaily_m3, 2)} m³`;
    if (flowQEl) flowQEl.innerText = `${fmt(q_m3h, 2)} m³/h`;
    if (tdhEl) tdhEl.innerText = `${fmt(tdh, 1)} m`;
    if (pumpKwEl) pumpKwEl.innerText = `${fmt(pumpKwRec, 1)} kW`;
    if (pvKwEl) pvKwEl.innerText = `${fmt(pvKw, 2)} kWc`;
    if (panelsCountEl) panelsCountEl.innerText = panels;
    if (pipeRecEl) pipeRecEl.innerText = pipeLabel(pipeD);
    if (cableRecEl) cableRecEl.innerText = `${standardCableSection(Math.max(1, pumpInputW / 550), Math.max(5, electricalDistance))} mm²`;
    if (batteryRecEl) batteryRecEl.innerText = `${fmt(batteryKwh, 2)} kWh`;
    if (invRecEl) invRecEl.innerText = `${inverterRec} W`;
    if (reservoirRecEl) reservoirRecEl.innerText = `${fmt(reservoirM3, 2)} m³`;

    const cableSection = standardCableSection(Math.max(1, pumpInputW / 550), Math.max(5, electricalDistance));
    if (wireNoteEl) wireNoteEl.innerText = `Câble cuivre ${cableSection} mm² pour ${electricalDistance} m`;
    if (safeNoteEl) {
      safeNoteEl.innerText = source === 'puits'
        ? 'Puits : vérifier la profondeur, la remontée d’eau et le débit réel.'
        : 'Priorité au bassin de réserve et à la gravité pour la fiabilité.';
    }

    if (consDayKpi) consDayKpi.innerText = `${fmt(dailyKwhTotal, 2)} kWh`;
    if (autonomyKpi) autonomyKpi.innerText = activeMode === 'pump'
      ? `${fmt(autonomyDays, 1)} h tampon`
      : `${fmt(autonomyDays, 1)} j`;
    if (lifeKpi) lifeKpi.innerText = batteryLife;

    const rVol = $('r_volume');
    const rPump = $('r_pump');
    const rPv = $('r_pv');
    const rBuffer = $('r_buffer');
    const rInv = $('r_inv');
    if (rVol) rVol.classList.toggle('highlight', volumeDaily_m3 > 0);
    if (rPump) rPump.classList.toggle('highlight', pumpKwRec >= 1.5);
    if (rPv) rPv.classList.toggle('highlight', pvKw >= 1);
    if (rBuffer) rBuffer.classList.toggle('highlight', batteryKwh > 0);
    if (rInv) rInv.classList.toggle('highlight', inverterRec > 500);

    const solar = dailySolarCurve(cityEl?.value || '', pvKw);
    const load = activeMode === 'pump'
      ? loadCurvePump(dailyKwhTotal, pumpHours)
      : loadCurveEnergy(loads);
    const battery = batteryCurve(solar, load, Math.max(1, batteryKwh || 1), 0.45);
    const yMax = Math.max(1, ...solar, ...load, batteryKwh || 1);

    drawChart(
      cityEl?.value || '',
      solar,
      load,
      battery,
      yMax,
      activeMode === 'pump'
        ? 'Pompage + solaire — ' + sourceName(source)
        : 'Énergie autonome — élevage / transformation'
    );

    if (sourcePill) sourcePill.innerHTML = `<i class="fas fa-water"></i> ${sourceName(source)}`;

    lastSnapshot = {
      mode: activeMode,
      city: cityEl?.value || '',
      country: countryEl?.value || '',
      crop: cropEl?.value || '',
      cropLabel: cropCfg.label,
      cropNeedMm: cropCfg.needMm,
      source,
      timestamp: new Date().toLocaleString('fr-FR'),
      sunH,
      temp: 0,
      volumeDaily_m3,
      q_m3h,
      tdh,
      pumpKwRec,
      pvKw,
      panels,
      panelW,
      pipeD,
      batteryKwh,
      batteryPacks,
      inverterRec,
      reservoirM3,
      dailyKwhTotal,
      batteryTech: batteryTechEl?.value || 'lifepo4',
      batteryTechName: batteryPack.name,
      batteryLife,
      loads,
      solar,
      load,
      battery,
      totalMonthKwh: dailyKwhTotal * 30,
      pumpHours,
      irrigDays,
      pipeDistance,
      electricalDistance,
      pumpSelectionNote,
      selectedPumpName: pumpPreset.name,
      selectedPumpKw: pumpPreset.powerKw
    };
  }

  /* =========================
     PDF
  ========================= */
  function renderPdfBlock() {
    const s = lastSnapshot;
    if (!s) return '';

    const tech = batteryPackForTech(s.batteryTech);

    const loadsHtml = s.loads.length
      ? s.loads.map(l => `
        <tr>
          <td style="padding:8px;border:1px solid #e6e6e6">${l.name}</td>
          <td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${l.power} W</td>
          <td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${l.hours} h/j</td>
          <td style="padding:8px;border:1px solid #e6e6e6;text-align:center">${fmt((l.power * l.hours) / 1000, 2)} kWh/j</td>
        </tr>
      `).join('')
      : `<tr><td colspan="4" style="padding:8px;border:1px solid #e6e6e6;text-align:center;color:#666">Aucun consommateur additionnel</td></tr>`;

    const safety = [
      'Protection manque d’eau, marche à sec et surintensité.',
      'Sectionneur DC, fusibles, parafoudre type II et mise à la terre.',
      'Clapet anti-retour et contrôle des pertes de charge sur la conduite.',
      'Batterie : ventilation, câbles protégés et charge adaptée à la technologie.',
      'Bassins et stockage d’eau recommandés avant stockage électrique.'
    ];

    return `
      <div style="position:relative;width:1120px;padding:22px;background:#fff;color:#222;font-family:Poppins,Arial,sans-serif;">
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-30deg);z-index:0;pointer-events:none;opacity:0.06;font-size:72px;color:#000;font-weight:900;white-space:nowrap">GREENBRIDGE — À TITRE INDICATIF</div>
        <div style="position:relative;z-index:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px">
            <div style="display:flex;gap:12px;align-items:center">

  async function generatePDF() {
    try {
      if (!lastSnapshot) computeAll();
      const wrapper = printBlock;
      if (!wrapper) return;
      wrapper.innerHTML = renderPdfBlock();
      const element = wrapper.firstElementChild;
      const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const margin = 10;
      const imgProps = pdf.getImageProperties(imgData);
      const pdfImgWidth = pageWidth - margin * 2;
      const pdfImgHeight = (imgProps.height * pdfImgWidth) / imgProps.width;

      if (pdfImgHeight <= pageHeight - margin * 2) {
        pdf.addImage(imgData, 'PNG', margin, margin, pdfImgWidth, pdfImgHeight);
      } else {
        const sliceHeightPx = Math.floor((pageHeight - margin * 2) / pdfImgHeight * canvas.height);
        let rendered = 0;
        while (rendered < canvas.height) {
          const sliceH = Math.min(canvas.height - rendered, sliceHeightPx);
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = canvas.width;
          sliceCanvas.height = sliceH;
          const ctx = sliceCanvas.getContext('2d');
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
          ctx.drawImage(canvas, 0, rendered, sliceCanvas.width, sliceCanvas.height, 0, 0, sliceCanvas.width, sliceCanvas.height);
          const sliceData = sliceCanvas.toDataURL('image/png');
          const sliceImgProps = pdf.getImageProperties(sliceData);
          const sliceImgHeight = (sliceImgProps.height * pdfImgWidth) / sliceImgProps.width;
          if (rendered > 0) pdf.addPage();
          pdf.addImage(sliceData, 'PNG', margin, margin, pdfImgWidth, sliceImgHeight);
          rendered += sliceH;
        }
      }

      pdf.setFontSize(9);
      pdf.setTextColor(120);
      pdf.text('GreenBridge — Synthèse indicative', margin, pageHeight - 6);
      const filename = `GreenBridge_zone_agricole_synthese_${(new Date()).toISOString().slice(0, 19).replace(/[:T]/g, '-')}.pdf`;
      pdf.save(filename);
    } catch (err) {
      console.error(err);
      alert('Erreur lors de la génération du PDF. Voir console pour détails.');
    }
  }

      if (a.id === 'mobileEtudeToggle' || a.id === 'mobileProduitsToggle') return;
      a.addEventListener('click', () => closeMenu());
    });

    function bindExpandable(toggleEl, subEl) {
      if (!toggleEl || !subEl) return;
      toggleEl.addEventListener('click', function (e) {
        if (e.target.closest('.caret')) {
          e.preventDefault();
          e.stopPropagation();
          const opening = subEl.style.display !== 'flex';
          document.querySelectorAll('.mobile-nav .submenu').forEach(s => {
            if (s !== subEl) s.style.display = 'none';
          });
          subEl.style.display = opening ? 'flex' : 'none';
          toggleEl.setAttribute('aria-expanded', String(opening));
          toggleEl.classList.toggle('active', opening);
          openMenu();
        } else {
          closeMenu();
        }
      });
    }

    bindExpandable($('mobileEtudeToggle'), $('mobileEtudeSub'));
    bindExpandable($('mobileProduitsToggle'), $('mobileProduitsSub'));

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeMenu();
    });

  function setupDesktopDropdowns() {
    document.querySelectorAll('.dropdown').forEach(drop => {
      let timer;
      const menu = drop.querySelector('.dropdown-content');
      const trigger = drop.querySelector('a');

      function open() {
        if (menu) menu.style.display = 'block';
        drop.setAttribute('aria-expanded', 'true');
      }

      function close() {
        if (menu) menu.style.display = 'none';
        drop.setAttribute('aria-expanded', 'false');
      }

      drop.addEventListener('mouseenter', () => {
        clearTimeout(timer);
        if (window.innerWidth > 1100) open();
      });

      drop.addEventListener('mouseleave', () => {
        timer = setTimeout(() => close(), 220);
      });

      if (trigger) {
        trigger.addEventListener('click', function (e) {
          if (window.innerWidth <= 1100) {
            e.preventDefault();
            if (menu && menu.style.display === 'block') close();
            else open();
            openMenu();
          }
        });
      }
    });
  }

  /* =========================
     Brilliance effect
  ========================= */
  function setupBrilliance() {
    const electricBand = $('electricBand');
    if (!electricBand) return;

    const orbA = $('orbA'), orbB = $('orbB'), orbC = $('orbC');
    const orbs = [orbA, orbB, orbC].filter(Boolean);
    const zapBright = $('zapBright');
    const params = [
      { rxRatio: 0.50, ry: 8, speed: 0.22, phase: 0 },
      { rxRatio: 0.33, ry: 6, speed: 0.36, phase: Math.PI / 2 },
      { rxRatio: 0.42, ry: 10, speed: 0.18, phase: Math.PI }
    ];

    orbs.forEach((o, i) => {
      o.classList.add('buzz');
      o.style.animationDelay = (i * 120) + 'ms';
    });

    let t0 = performance.now();

    function tick(now) {
      const time = (now - t0) / 1000;
      const cont = electricBand.querySelector('.container');
      if (!cont) {
        requestAnimationFrame(tick);
        return;
      }
      const rect = cont.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height / 2;

      for (let i = 0; i < orbs.length; i++) {
        const orb = orbs[i];
        const p = params[i];
        const rx = Math.max(Math.min(rect.width * p.rxRatio, 4000), 120);
        const ry = p.ry;
        const angle = (time * p.speed * Math.PI * 2) + p.phase;
        const x = cx + Math.cos(angle) * rx;
        const y = cy + Math.sin(angle) * ry;
        orb.style.left = x + 'px';
        orb.style.top = y + 'px';
        orb.style.transform = 'translate(-50%,-50%)';
      }
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);

    function sparkSVG() {
      if (!zapBright) return;
      try {
        const len = zapBright.getTotalLength ? zapBright.getTotalLength() : 520;
        zapBright.style.transition = 'none';
        zapBright.setAttribute('stroke-dasharray', String(len));
        zapBright.setAttribute('stroke-dashoffset', String(len));
        setTimeout(() => {
          zapBright.style.transition = 'stroke-dashoffset 380ms ease-out, opacity 160ms';
          zapBright.setAttribute('stroke-dashoffset', '0');
          setTimeout(() => {
            zapBright.setAttribute('stroke-dashoffset', String(len));
          }, 320);
        }, 60);
      } catch (e) {
        zapBright.setAttribute('stroke-dasharray', '520');
        zapBright.setAttribute('stroke-dashoffset', '520');
        setTimeout(() => {
          zapBright.style.transition = 'stroke-dashoffset 360ms ease-out';
          zapBright.setAttribute('stroke-dashoffset', '0');
        }, 80);
      }
    }

    function spawnSparks() {
      const cont = electricBand.querySelector('.container');
      if (!cont) return;
      for (let i = 0; i < 10; i++) {
        const s = document.createElement('div');
        s.style.position = 'absolute';
        s.style.left = (3 + Math.random() * 94) + '%';
        s.style.top = (20 + Math.random() * 50) + '%';
        s.style.width = '2px';
        s.style.height = (8 + Math.random() * 22) + 'px';
        s.style.borderRadius = '2px';
        s.style.background = 'linear-gradient(180deg, rgba(255,246,180,1), rgba(255,214,0,0.95))';
        s.style.filter = 'blur(6px)';
        s.style.opacity = '0';
        s.style.transform = 'translateY(6px)';
        s.style.pointerEvents = 'none';
        s.style.zIndex = '1';
        cont.appendChild(s);
        setTimeout(() => {
          s.style.transition = 'all 260ms ease-out';
          s.style.opacity = '1';
          s.style.transform = 'translateY(-6px)';
        }, 20 + i * 25);
        setTimeout(() => {
          s.style.transition = 'all 420ms ease-in';
          s.style.opacity = '0';
          s.style.transform = 'translateY(-20px)';
        }, 280 + i * 40);
        setTimeout(() => {
          if (s.parentNode) s.parentNode.removeChild(s);
        }, 760 + i * 40);
      }
    }

    function activate() {
      electricBand.classList.add('connected');
      spawnSparks();
      sparkSVG();
      setInterval(() => {
        spawnSparks();
        if (Math.random() > 0.45) sparkSVG();
      }, 900 + Math.random() * 900);
    }

    const title = document.querySelector('.company-name');
    if (title) {
      title.addEventListener('click', () => {
        const on = electricBand.classList.toggle('connected');
        if (on) {
          spawnSparks();
          sparkSVG();
        }
      });
    }

    activate();
    window.addEventListener('resize', () => { t0 = performance.now(); });
  }

    if (countryEl) populateCities(countryEl.value || 'ci');
    if (cropEl && !cropEl.value) cropEl.value = 'tomate';
    if (pumpPresetEl && !pumpPresetEl.value) pumpPresetEl.value = 'auto';

    renderSuggestedPresets();
    renderConsumers();
    setupBurger();
    setupDesktopDropdowns();
    updateActiveNav();
    setupEvents();
    setupBrilliance();
    toggleMode('pump');
    updateNeedMmForCountryAndCrop();
    computeAll();

    document.querySelectorAll('.dropdown .dropdown-content').forEach(m => m.style.display = 'none');
    const mobileEtudeSub = $('mobileEtudeSub');
    if (mobileEtudeSub) mobileEtudeSub.style.display = 'flex';
  }

  init();
})();
</script>
